<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abarna Rajan - About</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdfdfd;
      margin: 0;
      padding: 0;
    }
    .section {
      padding: 80px 0;
    }
    .progress {
      height: 10px;
    }
    h2, h3 {
      color: #2c2c2c;
    }
    .btn-primary {
      background-color: #6a5acd;
      border: none;
    }
    .btn-primary:hover {
      background-color: #5a4abc;
    }
    .progress-bar {
      transition: width 1.5s ease-in-out;
    }
  </style>
</head>
<body>

  <section id="about" class="section">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h2 class="text-uppercase text-primary fw-bold">About Me</h2>
          <h3 class="fw-bold display-6">Abarna Rajan</h3>
          <p class="mb-4">I'm an aspiring web and app developer passionate about building interactive user experiences. I'm continuously exploring new tools and frameworks to bring creative ideas to life.</p>

          <div class="mb-3">
            <label class="fw-bold">App development<span class="float-end">80%</span></label>
            <div class="progress">
              <div class="progress-bar bg-primary" role="progressbar" style="width: 90%;"></div>
            </div>
          </div>

          <div class="mb-3">
            <label class="fw-bold">Web Development <span class="float-end">100%</span></label>
            <div class="progress">
              <div class="progress-bar bg-primary" role="progressbar" style="width: 100%;"></div>
            </div>
          </div>

          <div class="mb-4">
            <label class="fw-bold">Software Development <span class="float-end">75%</span></label>
            <div class="progress">
              <div class="progress-bar bg-primary" role="progressbar" style="width: 75%;"></div>
            </div>
          </div>

          <a href="#contact" class="btn btn-primary rounded-pill px-4 py-2 shadow">Hire Me</a>
        </div>
        <div class="col-md-6 text-center">
          <img src="C:\Users\abarn\OneDrive\Desktop\portfolio\no3.jpg" alt="Abarna Rajan" class="img-fluid rounded shadow-lg">
        </div>
      </div>
    </div>
  </section>

  <script>
    // Animate progress bars when in view
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const bars = entry.target.querySelectorAll('.progress-bar');
          bars.forEach(bar => {
            bar.style.width = bar.getAttribute('style').match(/\d+/)[0] + '%';
          });
        }
      });
    }, { threshold: 0.6 });

    document.querySelectorAll('.progress').forEach(section => {
      observer.observe(section);
    });
  </script>
</body>
</html>
